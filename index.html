<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meine Webseite</title>
  <style>
    :root {
      /* HIER KÖNNEN SIE IHRE FARBEN ANPASSEN */
      --hintergrund-farbe: #f4f7f6; /* Helles Graublau für den Hintergrund */
      --text-farbe: #2c3e50;        /* Dunkles Blau-Grau für gute Lesbarkeit */
      --ueberschrift-farbe: #e76f51;/* Schönes Terracotta/Orange für den Titel */
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--hintergrund-farbe);
      color: var(--text-farbe);
      text-align: center;
      padding: 2rem;
      margin: 0;
    }
    h1 {
      color: var(--ueberschrift-farbe);
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      margin-top: 0;
    }
    img {
      width: 100%;
      max-width: 400px;
      height: auto;
      border-radius: 8px;
      margin: 1rem 0;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>
  <h1>Willkommen!</h1>
  <p>Schön, dass du hier bist.</p>

  <img src="mein-bild.jpg" alt="Beschreibung des Bildes" />

  <p>Mehr folgt bald.</p>
</body>
</html>
