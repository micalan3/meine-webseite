<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meine Webseite</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      /* HIER DIE HINTERGRUNDFARBE ÄNDERN */
      background-color: #2c3e50; /* Ein schönes, dunkles Blau-Grau */
      /* HIER DIE TEXTFARBE ÄNDERN */
      color: #ffffff;           /* Weißer Text für perfekten Kontrast */
      text-align: center;
      padding: 2rem;
      margin: 0;
    }
    h1 {
      /* HIER DIE FARBE DER ÜBERSCHRIFT ÄNDERN */
      color: #e76f51;           /* Ein auffälliges Terracotta-Orange */
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      margin-top: 0;
    }
    img {
      width: 100%;
      max-width: 400px;
      height: auto;
      border-radius: 8px;
      margin: 1rem 0;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <h1>Willkommen!</h1>
  <p>Schön, dass du hier bist.</p>

  <img src="mein-bild.jpg" alt="Beschreibung des Bildes" />

  <p>Mehr folgt bald.</p>
</body>
</html>
