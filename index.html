<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meine Webseite</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #222;
      text-align: center;
      padding: 2rem;
      margin: 0;
    }
    h1 {
      color: #2a9d8f;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      margin-top: 0;
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 1rem 0;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>
  <h1>Willkommen!</h1>
  <p>Schön, dass du hier bist.</p>

  <!-- Bild einfügen -->
  <img src="mein-bild.jpg" alt="Beschreibung des Bildes" />

  <p>Mehr folgt bald.</p>
</body>
</html>
